<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArUco 车辆监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        header { text-align: center; padding: 30px 0; margin-bottom: 20px; }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
        }

        .subtitle { color: #8892b0; margin-top: 10px; font-size: 0.95rem; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        .video-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 10px; height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
        }

        .status-indicator { display: flex; align-items: center; gap: 8px; color: #00ff88; font-size: 0.85rem; }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-wrapper img { width: 100%; height: auto; display: block; }

        .badge {
            position: absolute;
            top: 12px; left: 12px;
            background: rgba(255, 59, 48, 0.85);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .time-overlay {
            position: absolute;
            bottom: 12px; right: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            border-radius: 8px;
            font-family: Consolas, monospace;
            font-size: 0.8rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .stat-card .label { font-size: 0.75rem; color: #8892b0; margin-bottom: 4px; }
        .stat-card .value { font-size: 1.6rem; font-weight: 600; }
        .stat-card.in .value { color: #00ff88; }
        .stat-card.out .value { color: #ff6b6b; }
        .stat-card.track .value { color: #00d4ff; }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .panel h3 {
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rule-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rule-item:last-child { border-bottom: none; }

        .arrow { font-size: 1.2rem; }
        .arrow.down { color: #00ff88; }
        .arrow.up { color: #ff6b6b; }

        .event-list {
            max-height: 420px;
            overflow-y: auto;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
            font-size: 0.85rem;
        }

        .event-item.in { border-left: 3px solid #00ff88; }
        .event-item.out { border-left: 3px solid #ff6b6b; }

        .event-tag { font-weight: 600; color: #fff; }
        .event-time { color: #8892b0; font-size: 0.75rem; }

        .empty-hint {
            text-align: center;
            color: #5a6a8a;
            padding: 30px 0;
            font-size: 0.85rem;
        }

        footer { text-align: center; padding: 30px 0 10px; color: #5a6a8a; font-size: 0.85rem; }

        @media (max-width: 960px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ArUco 车辆监控</h1>
            <p class="subtitle">ArUco 标签轨迹追踪 · 自动判定进出库</p>
        </header>

        <div class="main-grid">
            <div class="video-container">
                <div class="video-header">
                    <h2>实时画面</h2>
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span>运行中</span>
                    </div>
                </div>

                <div class="video-wrapper">
                    <img src="/video_feed" alt="视频流" id="videoStream">
                    <span class="badge">● LIVE</span>
                    <div class="time-overlay" id="currentTime"></div>
                </div>

                <div class="stats-row">
                    <div class="stat-card in">
                        <div class="label">入库</div>
                        <div class="value" id="totalIn">0</div>
                    </div>
                    <div class="stat-card out">
                        <div class="label">出库</div>
                        <div class="value" id="totalOut">0</div>
                    </div>
                    <div class="stat-card track">
                        <div class="label">追踪中</div>
                        <div class="value" id="activeCount">0</div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h3>判定规则</h3>
                    <div class="rule-item">
                        <span class="arrow down">↓</span>
                        <span>上方 → 下方 = <strong style="color:#00ff88">入库</strong></span>
                    </div>
                    <div class="rule-item">
                        <span class="arrow up">↑</span>
                        <span>下方 → 上方 = <strong style="color:#ff6b6b">出库</strong></span>
                    </div>
                </div>

                <div class="panel">
                    <h3>最近事件</h3>
                    <div class="event-list" id="eventList">
                        <div class="empty-hint">等待车辆通过...</div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>ArUco DICT_6X6_1000 · 轨迹采样判定 · UDP 上报</p>
        </footer>
    </div>

    <script>
        function updateTime() {
            document.getElementById('currentTime').textContent =
                new Date().toLocaleString('zh-CN');
        }
        updateTime();
        setInterval(updateTime, 1000);

        const videoStream = document.getElementById('videoStream');
        videoStream.onerror = function() {
            setTimeout(() => {
                videoStream.src = '/video_feed?' + Date.now();
            }, 3000);
        };

        function formatTime(ts) {
            return new Date(ts * 1000).toLocaleTimeString('zh-CN');
        }

        async function refreshStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();

                document.getElementById('totalIn').textContent = data.total_in;
                document.getElementById('totalOut').textContent = data.total_out;
                document.getElementById('activeCount').textContent = data.active_count;

                const list = document.getElementById('eventList');
                if (!data.events || data.events.length === 0) {
                    list.innerHTML = '<div class="empty-hint">等待车辆通过...</div>';
                    return;
                }

                list.innerHTML = data.events.map(e => `
                    <div class="event-item ${e.op}">
                        <div>
                            <div class="event-tag">标签 #${e.tag_id} · ${e.op_label}</div>
                            <div class="event-time">${formatTime(e.timestamp)} · ${e.duration}s</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.warn('stats fetch failed', err);
            }
        }

        refreshStats();
        setInterval(refreshStats, 2000);
    </script>
</body>
</html>
