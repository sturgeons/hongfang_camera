<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频分析监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            letter-spacing: 3px;
        }

        .subtitle {
            color: #8892b0;
            margin-top: 10px;
            font-size: 1rem;
        }

        .video-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .video-title h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #fff;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(0, 255, 136, 0);
            }
        }

        .status-text {
            font-size: 0.85rem;
            color: #00ff88;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .video-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 10px;
        }

        .badge {
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .badge.live {
            background: rgba(255, 59, 48, 0.8);
            color: #fff;
        }

        .badge.aruco {
            background: rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }

        .time-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: 'Consolas', monospace;
            backdrop-filter: blur(5px);
        }

        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .info-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .info-card h3 {
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-card .value {
            font-size: 1.5rem;
            color: #00d4ff;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 40px 0 20px;
            color: #5a6a8a;
            font-size: 0.85rem;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            background: #000;
            border-radius: 12px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .container {
                padding: 10px;
            }
            
            .video-container {
                padding: 15px;
                border-radius: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📹 视频分析监控</h1>
            <p class="subtitle">ArUco 标记实时检测与追踪系统</p>
        </header>

        <div class="video-container">
            <div class="video-header">
                <div class="video-title">
                    <h2>实时分析画面</h2>
                </div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">运行中</span>
                </div>
            </div>

            <div class="video-wrapper">
                <img src="/video_feed" alt="视频流" id="videoStream">
                <div class="video-overlay">
                    <span class="badge live">● LIVE</span>
                    <span class="badge aruco">ArUco 检测</span>
                </div>
                <div class="time-overlay" id="currentTime"></div>
            </div>
        </div>

        <div class="info-panel">
            <div class="info-card">
                <h3>检测模式</h3>
                <div class="value">DICT_6X6_1000</div>
            </div>
            <div class="info-card">
                <h3>处理方式</h3>
                <div class="value">GPU CUDA</div>
            </div>
            <div class="info-card">
                <h3>视频源</h3>
                <div class="value">RTSP 流</div>
            </div>
            <div class="info-card">
                <h3>状态</h3>
                <div class="value" style="color: #00ff88;">正常</div>
            </div>
        </div>

        <footer>
            <p>视频分析监控系统 · ArUco 标记检测</p>
        </footer>
    </div>

    <script>
        // 更新当前时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('currentTime').textContent = timeStr;
        }
        
        updateTime();
        setInterval(updateTime, 1000);

        // 检测视频流状态
        const videoStream = document.getElementById('videoStream');
        videoStream.onerror = function() {
            console.log('视频流连接失败，尝试重连...');
            setTimeout(() => {
                videoStream.src = '/video_feed?' + new Date().getTime();
            }, 3000);
        };
    </script>
</body>
</html>
